name: 自动跑E2E测试

on:
  push:
    branches: [ main, develop ]   # 当有人推送到这些分支时触发
  pull_request:
    branches: [ main ]            # 当有人提PR到main分支时触发

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test e2e/goods-flow.spec.ts   # 运行你的测试