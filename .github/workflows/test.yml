name: 自动跑E2E测试

on:
  push:
    branches: [ main, develop ]   # 当有人推送到这些分支时触发
  pull_request:
    branches: [ main ]            # 当有人提PR到main分支时触发

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Check website availability
        run: curl -I https://test.piyuan.cn/ || true

      - name: Run Playwright tests (with trace & HTML report)
        run: npx playwright test --trace on
        env:
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_PRICE: ${{ secrets.TEST_PRICE }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()   # 无论成功或失败都上传报告
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/